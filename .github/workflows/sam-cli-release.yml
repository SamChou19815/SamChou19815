name: sam-cli release
on:
  push:
    branches:
      - main
    paths:
      - "crates/sam-cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/sam-cli-release.yml"

permissions:
  contents: write

concurrency:
  group: sam-cli-release
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            targets: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            targets: aarch64-unknown-linux-musl
          - runner: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: sam-cli-release-${{ matrix.runner }}
      - name: Build
        run: |
          mkdir -p dist
          for target in $(echo "${{ matrix.targets }}" | tr ',' ' '); do
            cargo build --release -p sam-cli --target "$target"
            case "$target" in
              x86_64-unknown-linux-musl)  name=sam-cli-linux-x86_64 ;;
              aarch64-unknown-linux-musl) name=sam-cli-linux-aarch64 ;;
              x86_64-apple-darwin)        name=sam-cli-macos-x86_64 ;;
              aarch64-apple-darwin)       name=sam-cli-macos-aarch64 ;;
            esac
            cp "target/$target/release/sam" "dist/$name"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: sam-cli-${{ matrix.runner }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete sam-cli-latest --cleanup-tag --yes || true
          gh release create sam-cli-latest dist/* \
            --title "sam-cli latest" \
            --notes "Rolling build from ${GITHUB_SHA}" \
            --target "${GITHUB_SHA}" \
            --latest=false

name: Rust
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cargo-build-debug
      - name: Format Check
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --no-deps --tests --bins -- -D warnings
      - name: Build
        run: cargo build --tests --bins
  test-sam-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sam-run
      - name: Verify sam-run is on PATH
        run: |
          command -v sam-run
          sam-run --version
          ./sam-cli --help
